<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ingreso del Paciente</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Ingreso del Paciente</h2>

    <form id="patientForm">
      <label
        >NOMBRE:
        <input type="text" id="patientName" />
      </label>
      <label
        >EDAD:
        <input type="number" id="patientAge" min="0" max="120" />
      </label>
      <label
        >PESO:
        <input type="number" step="0.1" id="patientPeso" />
      </label>
      <label
        >H.C.:
        <input type="number" id="patientHistory" />
      </label>
      <label
        >CAMA:
        <input type="number" id="patientBed" readonly />
      </label>
      <label
        >INGRESO:
        <input type="datetime-local" id="patientIngreso" />
      </label>
      <button type="submit">Guardar</button>
    </form>

    <a href="index.html"><button>Volver</button></a>
    <a href="grafica.html"><button>Ir a Gráfica</button></a>

    <script src="script.js"></script>
  </body>
</html>
